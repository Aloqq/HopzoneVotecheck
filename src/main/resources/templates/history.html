<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История проверок</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container wide">
    <h1>История проверок</h1>

    <form method="get" th:action="@{/history}" class="card filters">
        <label>
            IP:
            <input type="text" name="ip" th:value="${ip}" placeholder="Точный IP">
        </label>
        <label>
            Voted:
            <select name="voted">
                <option value="all" th:selected="${voted == 'all'}">Все</option>
                <option value="true" th:selected="${voted == 'true'}">true</option>
                <option value="false" th:selected="${voted == 'false'}">false</option>
            </select>
        </label>
        <label>
            Дата от:
            <input type="date" name="dateFrom" th:value="${dateFrom}">
        </label>
        <label>
            Дата до:
            <input type="date" name="dateTo" th:value="${dateTo}">
        </label>
        <label>
            На странице:
            <input type="number" min="1" max="500" name="size" th:value="${size}">
        </label>
        <button type="submit">Применить</button>
    </form>

    <div class="card table-wrap">
    <table class="table">
        <thead>
        <tr>
            <th>Дата (UTC)</th>
            <th>IP</th>
            <th>voted</th>
            <th>voteTime</th>
            <th>serverTime</th>
            <th>status</th>
            <th>ms</th>
            <th>apiver</th>
            <th>server</th>
            <th>ник</th>
            <th>TG</th>
            <th>Discord</th>
            <th>Email</th>
            <th>report</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(rows)}">
            <td colspan="14">Нет записей</td>
        </tr>
        <tr th:each="row : ${rows}">
            <td th:text="${row.createdAtUtc}"></td>
            <td th:title="${row.ip}" th:text="${row.maskedIp}"></td>
            <td th:text="${row.voted}"></td>
            <td th:text="${row.voteTime} ?: '-'"></td>
            <td th:text="${row.hopzoneServerTime} ?: '-'"></td>
            <td th:text="${row.hopzoneStatusCode != null ? row.hopzoneStatusCode : (row.hopzoneHttpStatus != null ? row.hopzoneHttpStatus : '-')}"></td>
            <td th:text="${row.hopzoneResponseTimeMs} ?: '-'"></td>
            <td th:text="${row.hopzoneApiver} ?: '-'"></td>
            <td th:text="${row.hopzoneServerId} ?: '-'"></td>
            <td th:text="${row.gameNickname} ?: '-'"></td>
            <td th:text="${row.telegram} ?: '-'"></td>
            <td th:text="${row.discord} ?: '-'"></td>
            <td th:text="${row.email} ?: '-'"></td>
            <td><a th:href="@{|/report/${row.reportHash}|}" target="_blank">открыть</a></td>
        </tr>
        </tbody>
    </table>
    </div>

    <div class="pagination">
        <a th:if="${!pageData.first}"
           class="pagination-link"
           th:href="@{/history(page=${pageData.number - 1},size=${size},ip=${ip},voted=${voted},dateFrom=${dateFrom},dateTo=${dateTo})}">
            ← Назад
        </a>
        <span th:text="|Стр. ${pageData.number + 1} / ${pageData.totalPages == 0 ? 1 : pageData.totalPages}|"></span>
        <a th:if="${!pageData.last}"
           class="pagination-link"
           th:href="@{/history(page=${pageData.number + 1},size=${size},ip=${ip},voted=${voted},dateFrom=${dateFrom},dateTo=${dateTo})}">
            Вперёд →
        </a>
    </div>

    <p><a th:href="@{/verify}">← Вернуться к проверке</a></p>
</main>

</body>
</html>
